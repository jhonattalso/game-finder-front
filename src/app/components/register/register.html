<div class="min-h-screen w-screen bg-slate-50 flex items-center justify-center p-6 font-sans m-0">
  <div class="w-full max-w-md bg-white rounded-2xl p-10 shadow-sm border border-slate-100 transition-all">

    <header class="text-center mb-10">
      <h2 class="text-3xl font-extrabold tracking-tight text-slate-950">Criar Nova Conta</h2>
      <p class="text-slate-500 mt-2">Junte-se à nossa comunidade de gamers</p>
    </header>

    <form (ngSubmit)="efetuarRegistro()" class="space-y-6">
      <div class="space-y-2">
        <label class="text-sm font-semibold text-slate-700 ml-1">Usuário</label>
        <input
          type="text"
          name="user"
          [(ngModel)]="userData.username"
          placeholder="Escolha um usuário"
          required
          class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-slate-900 transition-all placeholder-slate-400"
        >
      </div>

      <div class="space-y-2">
        <label class="text-sm font-semibold text-slate-700 ml-1">Senha</label>
        <input
          type="password"
          name="pass"
          [(ngModel)]="userData.password"
          placeholder="Crie uma senha forte"
          required
          class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-slate-900 transition-all placeholder-slate-400"
        >
      </div>

      @if (message()) {
        <div class="bg-slate-100 border border-slate-200 text-slate-700 text-xs font-medium px-4 py-3 rounded-lg text-center">
          {{ message() }}
        </div>
      }

      <button
        type="submit"
        class="w-full py-3.5 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-xl transition-all shadow-lg shadow-slate-200 active:scale-[0.98]"
      >
        Registrar
      </button>
    </form>

    <footer class="mt-8 text-center border-t border-slate-50 pt-6">
      <p class="text-sm text-slate-500">
        Já tem conta?
        <a routerLink="/login" class="text-slate-900 font-bold hover:underline underline-offset-4">Faça Login</a>
      </p>
    </footer>
  </div>
</div>
