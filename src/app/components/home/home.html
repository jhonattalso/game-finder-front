<div class="min-h-screen w-screen bg-slate-50 text-slate-900 p-6 md:p-10 font-sans m-0">

  <header class="flex flex-col sm:flex-row sm:items-center justify-between mb-12 gap-4 pb-8 border-b border-slate-200 w-full">
    <div>
      <h1 class="text-3xl font-extrabold tracking-tight text-slate-950">
        Game Finder
      </h1>
      <p class="text-slate-600 mt-1">Recomendações personalizadas.</p>

      <a
        href="javascript:void(0)"
        (click)="logout()"
        class="text-sm text-red-500 hover:text-red-700 hover:underline mt-2 inline-block transition-all"
      >
        Sair da conta
      </a>
    </div>

    <div class="relative w-full sm:w-80">
      <input
        type="text"
        [(ngModel)]="filtro"
        placeholder="Filtrar jogos..."
        class="w-full bg-white border border-slate-200 rounded-full px-5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-slate-900 transition-all placeholder-slate-400 shadow-inner"
      >
    </div>
  </header>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 w-full">
    <div *ngFor="let jogo of jogosFiltrados()"
         class="bg-white rounded-2xl p-8 border border-slate-100 shadow-sm hover:shadow-lg transition-all duration-300 flex flex-col">

      <div class="mb-6 flex-grow">
        <h3 class="text-2xl font-bold text-slate-950 mb-5 tracking-tight">{{ jogo.nome }}</h3>
        <button
          (click)="buscar(jogo.slug)"
          class="w-full py-3 px-5 bg-slate-900 hover:bg-slate-800 text-white font-semibold rounded-xl transition-colors text-sm tracking-wide"
        >
          Ver Recomendação
        </button>
      </div>

      <div *ngIf="recommendations()[jogo.slug]" class="mt-2 pt-6 border-t border-slate-100">
        <app-game-card
          [name]="recommendations()[jogo.slug].name"
          [recommendation]="recommendations()[jogo.slug].recommendation"
          [rating]="recommendations()[jogo.slug].rating"
          [explanation]="recommendations()[jogo.slug].recommendation"
          (onClose)="fecharCard(jogo.slug)">
        </app-game-card>
      </div>
    </div>
  </div>
</div>
