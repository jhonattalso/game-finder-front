<div class="card">
  <h3>{{ tituloFormatado() }}</h3>
  <p><strong>Recomendação:</strong> {{ recommendation() }}</p>
  <p><strong>Nota:</strong> {{ rating() }}</p>
  <p>{{ explanation() }}</p>

  <div class="actions">
    <button (click)="toggleFavorito()">
      {{ favorito() ? '❤️ Favoritado' : '🤍 Favoritar' }}
    </button>

    <button (click)="notificarClique()">Ver detalhes</button>
  </div>
</div>
