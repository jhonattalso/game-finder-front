<div class="bg-slate-50 rounded-xl p-6 border border-slate-200/70 animate-fade-in shadow-inner">
  <div class="flex justify-between items-start mb-4 gap-2">
    <h3 class="text-lg font-bold text-slate-950 leading-snug tracking-tight">{{ tituloFormatado() }}</h3>
    <span class="flex items-center gap-1.5 text-sm font-semibold text-amber-600 bg-amber-50 px-3 py-1 rounded-full border border-amber-100 whitespace-nowrap">
      <span class="text-xs">⭐</span> {{ rating() }}
    </span>
  </div>

  <div class="space-y-3 mb-6 text-sm text-slate-700 leading-relaxed">
    <p>
      <strong class="font-semibold text-slate-900">Recomendação:</strong> {{ recommendation() }}
    </p>
    <p class="text-slate-600 italic bg-white p-4 rounded-lg border border-slate-100">
      {{ explanation() }}
    </p>
  </div>

  <div class="flex items-center gap-3 border-t border-slate-200/70 pt-5">
    <button
      (click)="toggleFavorito()"
      class="flex-1 py-2.5 px-4 rounded-lg text-xs font-bold transition-all border flex items-center justify-center gap-2"
      [class]="favorito() ? 'bg-red-50 border-red-100 text-red-600' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50 hover:border-slate-300'"
    >
      {{ favorito() ? '❤️ Favoritado' : '🤍 Favoritar' }}
    </button>

    <button
      (click)="notificarClique()"
      class="flex-1 py-2.5 px-4 bg-white border border-slate-200 text-slate-800 hover:bg-slate-900 hover:text-white hover:border-slate-900 rounded-lg text-xs font-bold transition-all"
    >
      Ver detalhes
    </button>
  </div>
</div>
